<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Mmary - Personal Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; font-size: 2.5em; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        h2 { color: #2980b9; margin-top: 30px; font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        p { font-size: 1.1em; color: #555; }
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; font-size: 1.05em; }
        .project-card { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-left: 4px solid #3498db; border-radius: 4px; }
        .project-card strong { color: #2c3e50; font-size: 1.1em; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="name">Loading...</h1>
        <p id="profile"></p>
        
        <h2>Skills</h2>
        <ul id="skills"></ul>

        <h2>Qualifications</h2>
        <ul id="qualifications"></ul>

        <h2>Projects</h2>
        <div id="projects"></div>

        <h2>Contact Information</h2>
        <p id="contact"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
