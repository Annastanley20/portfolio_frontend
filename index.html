<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Mmary - Academic Data Science Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Hero Section with Modern Background Color */
        .hero-banner {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .profile-wrapper {
            margin-bottom: 15px;
        }

        .profile-wrapper img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .hero-banner h1 { margin: 10px 0; font-size: 2.3em; font-weight: 600; }
        .hero-banner p { font-size: 1.1em; opacity: 0.9; max-width: 600px; margin: 0 auto; }

        .main-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .portfolio-card {
            background: var(--card-bg);
            padding: 30px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #eef2f5;
        }

        h2 {
            font-size: 1.4em;
            color: #1e3c72;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Clickable Interactive Skills badges */
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-item {
            background-color: #eef2f7;
            color: #2a5298;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .skill-item:hover {
            background-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* Qualifications Styling */
        .qual-list {
            list-style: none;
            padding: 0;
        }

        .qual-list li {
            padding: 12px 15px;
            background: #fafbfc;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
        }

        /* Clickable Dynamic Project Cards */
        .projects-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media(max-width: 600px) { .projects-layout { grid-template-columns: 1fr; } }

        .clickable-project-card {
            background: #fafbfc;
            border: 1px solid #eef2f5;
            padding: 20px;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .clickable-project-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .clickable-project-card strong {
            color: #1e3c72;
            font-size: 1.15em;
            display: block;
            margin-bottom: 8px;
        }

        .clickable-project-card p {
            color: var(--text-muted);
            font-size: 0.95em;
            margin: 0 0 15px 0;
        }

        .project-action-text {
            color: var(--accent-color);
            font-size: 0.9em;
            font-weight: 500;
        }

        /* Clickable Contact Links */
        .contact-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .clickable-contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #1e3c72;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.95em;
            transition: background 0.2s;
        }

        .clickable-contact-btn:hover { background: var(--accent-color); }
        .clickable-contact-btn.github-color { background: #24292e; }
        .clickable-contact-btn.github-color:hover { background: #444; }
    </style>
</head>
<body>

    <div class="hero-banner">
        <div class="profile-wrapper">
            <!-- Modern Placeholder profile picture -->
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=200&auto=format&fit=crop" alt="Anna Mmary">
        </div>
        <h1 id="name">Loading...</h1>
        <p id="profile"></p>
    </div>

    <div class="main-container">
        <!-- SKILLS SECTION -->
        <div class="portfolio-card">
            <h2><i class="fa-solid fa-brain"></i> Professional Skills</h2>
            <div id="skills" class="skills-grid"></div>
        </div>

        <!-- QUALIFICATIONS SECTION -->
        <div class="portfolio-card">
            <h2><i class="fa-solid fa-graduation-cap"></i> Academic Qualifications</h2>
            <ul id="qualifications" class="qual-list"></ul>
        </div>

        <!-- PROJECTS SECTION -->
        <div class="portfolio-card">
            <h2><i class="fa-solid fa-code-branch"></i> Practical Projects</h2>
            <div id="projects" class="projects-layout"></div>
        </div>

        <!-- CONTACT SECTION -->
        <div class="portfolio-card">
            <h2><i class="fa-solid fa-address-book"></i> Connect with Me</h2>
            <div id="contact" class="contact-flex"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
