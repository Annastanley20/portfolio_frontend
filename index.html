<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Mmary | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #555555;
            --light-grey: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            padding: 30px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
        }

        nav .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px 10%;
            min-height: 80vh;
        }

        .hero-text { flex: 1; }
        .hero-text h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 4rem; 
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-text p { font-size: 1.2rem; color: var(--accent); max-width: 500px; }

        .hero-image { flex: 1; text-align: right; }
        .hero-image img {
            width: 400px;
            height: 500px;
            object-fit: cover;
            border-radius: 5px;
            filter: grayscale(100%); /* Kayla Padilla often uses grayscale for a classic look */
            transition: 0.5s;
        }
        .hero-image img:hover { filter: grayscale(0%); }

        /* Sections */
        .container { padding: 80px 10%; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 40px; }

        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .project-card {
            text-decoration: none;
            color: inherit;
            display: block;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            transition: 0.3s;
        }
        .project-card:hover { border-bottom-color: var(--text); }
        .project-card h3 { font-size: 1.5rem; margin: 15px 0 5px 0; }
        .project-card p { color: var(--accent); font-size: 0.9rem; }

        /* Contact Section */
        .contact { background: var(--light-grey); text-align: center; padding: 100px 10%; }
        .contact a {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--text);
            text-decoration: none;
            margin: 20px 0;
        }
        .socials { margin-top: 30px; display: flex; justify-content: center; gap: 30px; font-size: 1.5rem; }
        .socials a { font-family: 'Inter'; font-size: 1rem; color: var(--accent); }

        footer { padding: 40px 10%; text-align: center; font-size: 0.8rem; color: #999; }

        @media (max-width: 768px) {
            .hero { flex-direction: column-reverse; text-align: center; }
            .hero-text h1 { font-size: 2.5rem; }
            .hero-image img { width: 100%; height: auto; }
            .hero-image { margin-bottom: 40px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AM.</div>
        <div class="menu">Portfolio 2024</div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1 id="name">Loading...</h1>
            <p id="profile"></p>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1531123897727-8f129e16fd3c?q=80&w=600&auto=format&fit=crop" alt="Anna Mmary">
        </div>
    </section>

    <div class="container" id="projects-section">
        <h2>Selected Works</h2>
        <div class="projects-grid" id="projects">
            </div>
    </div>

    <section class="contact">
        <h2>Let's talk.</h2>
        <a id="email-link" href="#">hello@annammary.com</a>
        <div class="socials">
            <a id="github-link" target="_blank" href="#"><i class="fa-brands fa-github"></i> GitHub</a>
            <a id="phone-link" href="#"><i class="fa-solid fa-phone"></i> Phone</a>
        </div>
    </section>

    <footer>
        &copy; 2024 Anna Mmary Portfolio. Powered by Cloud Computing.
    </footer>

    <script src="script.js"></script>
</body>
</html>
